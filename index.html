<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GeoPredio | Consulta geográfica de predios en Santiago de Cali</title>
        <meta name="description" content="GeoPredio es una herramienta web para la búsqueda geográfica de predios urbanos en el Distrito de 
        Santiago de Cali. Consulta predios mediante identificadores como ID PREDIO o NPN, o directamente con coordenadas geográficas.
        Visualiza resultados en un mapa interactivo y una tabla con información alfanumérica catastral.">
        <meta name="keywords" content="Búsqueda, consulta, catastro, predio, terreno, Cali, coordenadas, identificadores">
        <meta name="author" content="Cristian Quintero Salazar | Carlos Bermúdez López | Francisco Orozco Suárez">
        <meta name="robots" content="index, follow">
        <link rel="canonical" href="https://www.misitioweb.com"> <!-- Permite que el sitio web nunca se mueva de su link original (seguridad) -->
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/png" href="img/marca.png">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin="">
    </head>
    <body>
        <header>
            <h2><img class="icon" src="img/marca.png" alt=""> GeoPredio</h2>
        </header>
        <main>
            <div class="container">
                <aside class="item1">
                    <label>Seleccione el tipo de consulta</label>
                        <select class="lista">
                            <option value="ID_PREDIO">ID PREDIO</option>
                            <!-- <option value="NPN">NPN</option> -->
                            <!-- <option value="COORDENADAS">COORDENADAS</option> -->
                        </select>
                    <input type="number" id="codigoInput" placeholder="0">
                    <button onclick="consultarDatos()">BUSCAR</button>
                </aside>
                <div class="item2">
                    <div id="map"></div>
                </div>
                <section class="item3">
                    <table class="tabla2" id="tablaInfo" style="display:none;">
                        <thead>
                            <tr>
                                <th>ID PREDIO</th>
                                <th>DEPARTAMENTO</th>
                                <th>MUNICICPIO</th>
                                <th>ZONA</th>
                                <th>SECTOR</th>
                                <th>COMUNA</th>
                                <th>BARRIO</th>
                                <th>MANZANA</th>
                                <th>TERRENO</th>
                                <th>NPN</th>
                                <th>NÚMERO PREDIAL</th>
                                <th>ÁREA (m²)</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla"></tbody>
                    </table>
                </section>
            </div>
        </main>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="script.js"></script>
    </body>
</html>
