<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GeoPredio | Consulta geográfica de predios en Santiago de Cali</title>
        <meta name="description" content="GeoPredio es una herramienta web para la búsqueda geográfica de predios urbanos en el Distrito de 
        Santiago de Cali. Consulta predios mediante identificadores como ID PREDIO o NPN, o directamente con coordenadas geográficas.
        Visualiza resultados en un mapa interactivo y una tabla con información alfanumérica catastral.">
        <meta name="keywords" content="Búsqueda, consulta, catastro, predio, terreno, Cali, coordenadas, identificadores">
        <meta name="author" content="Cristian Quintero Salazar | Carlos Bermúdez López | Francisco Orozco Suárez">
        <meta name="robots" content="index, follow">
        <link rel="canonical" href="https://www.misitioweb.com"> <!-- Permite que el sitio web nunca se mueva de su link original (seguridad) -->
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/png" href="img/marca.png">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin="">
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    </head>
    <body>
        <header>
            <h2><img class="icon" src="img/marca.png" alt=""> GeoPredio</h2>
        </header>
        <main>
            <div class="container">
                <aside class="item1">
                    <label>Seleccione el tipo de consulta</label>
                        <select class="lista">
                            <option value="ID_PREDIO">ID PREDIO</option>
                            <option value="NPN">NPN</option>
                            <option value="COORDENADAS">COORDENADAS</option>
                        </select>
                    <input placeholder="0">
                    <button>BUSCAR</button>
                    <button>Google Maps</button>
                </aside>
                <div class="item2">
                    <div id="map"></div>
                    <!-- <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d180240.67505459097!2d-76.63000896226411!3d3.400409622838908!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8e30a6f0cc4bb3f1%3A0x1f0fb5e952ae6168!2sCali%2C%20Valle%20del%20Cauca!5e0!3m2!1ses!2sco!4v1770749120308!5m2!1ses!2sco" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe> -->
                </div>
                <section class="item3">
                    <h2>Tabla</h2>
                    <img class="tabla" src="img/tabla.png" alt="tabla">
                </section>
            </div>
        </main>
        <!-- <footer>
            <p>Información de Contacto</p>
        </footer> -->
        <script src="script.js"></script>
    </body>
</html>
